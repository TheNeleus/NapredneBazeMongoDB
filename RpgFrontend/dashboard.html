<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG - Glavni ekran</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light" onload="loadDashboard()">
    
    <nav class="navbar navbar-dark bg-secondary shadow-sm">
        <div class="container">
            <span class="navbar-brand mb-0 h1 text-warning">RPG Avantura</span>
            <div>
                <a href="dashboard.html" class="btn btn-info btn-sm me-2 fw-bold shadow text-dark">🎒 Inventory</a>
                <a href="clan.html" class="btn btn-success btn-sm me-2 fw-bold shadow">🛡️ Clans</a>
                <a href="auction.html" class="btn btn-warning btn-sm me-3 fw-bold shadow text-dark">⚖️ Auction house</a>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">Odjavi se</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card bg-secondary text-white mb-4 border-warning shadow" style="border-radius: 10px;">
            <div class="card-body d-flex justify-content-between align-items-center">
                <h3 class="m-0">
                    <span id="playerName" class="fw-bold">Učitavanje...</span> 
                    <span id="playerClan" class="fs-5 ms-2"></span>
                </h3>
                <h4 class="m-0 text-warning fw-bold">🪙 Zlato: <span id="playerGold">0</span></h4>
            </div>
        </div>

        <div class="row">
            <div class="col-md-8">
                <div class="card bg-dark text-white mb-4 p-3 border-info shadow" style="border-radius: 8px;">
                    <h5 class="text-info mb-3 text-uppercase small fw-bold">🎁 Otvori Loot Box</h5>
                    <div class="input-group">
                        <input type="text" id="boxIdInput" class="form-control bg-secondary text-white border-info" placeholder="ID kutije će se pojaviti ovde...">
                        <button class="btn btn-info fw-bold text-dark" onclick="openLootBox()">Zavrti rulet!</button>
                    </div>
                    <div id="lootboxMessage" class="mt-2 small fw-bold"></div>
                </div>

                <h4 class="mb-3 border-bottom border-warning pb-2">Moj Ranac (Inventar)</h4>
                <div class="row" id="inventoryContainer">
                    </div>
            </div>

            <div class="col-md-4">
                <div class="card bg-dark text-white shadow border-warning" style="border-radius: 8px;">
                    <div class="card-header border-warning text-warning fw-bold text-uppercase">
                        🛒 Dostupne Kutije
                    </div>
                    <div class="card-body p-2" id="availableBoxesContainer">
                        <p class="text-muted small text-center mt-2">Učitavanje kutija...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
