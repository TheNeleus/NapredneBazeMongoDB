<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Igra - Registracija</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light">
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card bg-secondary text-white p-4 shadow-lg" style="width: 25rem;">
            <h2 class="text-center mb-4 text-success">Registracija</h2>
            <div id="register-form">
                <div class="mb-3">
                    <label for="regUsername" class="form-label">Izaberi korisničko ime</label>
                    <input type="text" class="form-control" id="regUsername" placeholder="Unesite username...">
                </div>
                <button class="btn btn-success w-100 fw-bold" onclick="register()">Registruj se</button>
                
                <div class="mt-3 text-center">
                    <a href="index.html" class="text-warning text-decoration-none small">Već imaš nalog? Prijavi se ovde.</a>
                </div>
                
                <div id="regMessage" class="mt-3 text-center small fw-bold"></div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
