<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Igra - Prijava</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light">
    <div class="container d-flex justify-content-center align-items-center vh-100">
        <div class="card bg-secondary text-white p-4 shadow-lg" style="width: 25rem;">
            <h2 class="text-center mb-4">RPG Avantura</h2>
            <div id="login-form">
                <div class="mb-3">
                    <label for="username" class="form-label">Korisničko ime</label>
                    <input type="text" class="form-control" id="username" placeholder="Unesite username...">
                </div>
                <button class="btn btn-warning w-100 fw-bold" onclick="login()">Prijavi se</button>
                <div id="message" class="mt-3 text-center small"></div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
