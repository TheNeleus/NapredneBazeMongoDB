<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG - Aukcijska Kuća</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light" onload="loadAuctionPage()">
    
    <nav class="navbar navbar-dark bg-secondary shadow-sm">
        <div class="container">
            <span class="navbar-brand mb-0 h1 text-warning">RPG Avantura</span>
            <div>
                <a href="dashboard.html" class="btn btn-info btn-sm me-2 fw-bold shadow text-dark">🎒 Inventory</a>
                <a href="clan.html" class="btn btn-success btn-sm me-2 fw-bold shadow">🛡️ Clans</a>
                <a href="auction.html" class="btn btn-warning btn-sm me-3 fw-bold shadow text-dark">⚖️ Auction house</a>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">Odjavi se</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card bg-secondary text-white mb-4 border-warning shadow" style="border-radius: 10px;">
            <div class="card-body d-flex justify-content-between align-items-center">
                <h3 class="m-0">
                    <span id="playerName" class="fw-bold">Učitavanje...</span> 
                    <span id="playerClan" class="fs-5 ms-2"></span>
                </h3>
                <h4 class="m-0 text-warning fw-bold"><span class="coin-icon"></span> Zlato: <span id="playerGold">0</span></h4>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card bg-dark text-white shadow border-info mb-4" style="border-radius: 8px;">
                    <div class="card-header border-info text-info fw-bold text-uppercase d-flex align-items-center">
                        <span class="me-2">🔨</span> PRODAJ PREDMET
                    </div>
                    <div class="card-body p-3">
                        
                        <div class="mb-3">
                            <label for="auctionItemSelect" class="form-label text-info fw-bold small mb-1">PREDMET IZ RANCA</label>
                            <select id="auctionItemSelect" class="form-select bg-secondary text-white border-secondary shadow-none">
                                </select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="auctionQuantity" class="form-label text-info fw-bold small mb-1">KOLIČINA ZA PRODAJU</label>
                            <input type="number" id="auctionQuantity" class="form-control bg-secondary text-white border-secondary shadow-none" value="1" min="1">
                        </div>
                        
                        <div class="mb-3">
                            <label for="auctionPrice" class="form-label text-info fw-bold small mb-1">POČETNA CENA (<span class="coin-icon"></span> ZLATO)</label>
                            <input type="number" id="auctionPrice" class="form-control bg-secondary text-white border-secondary shadow-none" value="10" min="1">
                        </div>
                        
                        <div class="mb-4">
                            <label for="auctionDuration" class="form-label text-info fw-bold small mb-1">TRAJANJE AUKCIJE (SATI)</label>
                            <input type="number" id="auctionDuration" class="form-control bg-secondary text-white border-secondary shadow-none" value="12" min="0">
                        </div>
                        
                        <button class="btn btn-info w-100 fw-bold text-dark text-uppercase" onclick="createAuction()">Postavi na aukciju</button>
                        <div id="auctionMessage" class="mt-2 small text-center fw-bold"></div>
                        
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <h4 class="mb-3 border-bottom border-warning pb-2">Aktivne ponude</h4>
                <div class="row" id="activeAuctionsContainer">
                    <p class="text-muted small">Učitavanje aukcija...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
