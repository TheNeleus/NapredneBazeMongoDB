<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG - Klanovi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dark text-light" onload="loadClanPage()">
    
    <nav class="navbar navbar-dark bg-secondary shadow-sm">
        <div class="container">
            <span class="navbar-brand mb-0 h1 text-warning">RPG Avantura</span>
            <div>
                <a href="dashboard.html" class="btn btn-info btn-sm me-2 fw-bold shadow text-dark">🎒 Inventory</a>
                <a href="clan.html" class="btn btn-success btn-sm me-2 fw-bold shadow">🛡️ Clans</a>
                <a href="auction.html" class="btn btn-warning btn-sm me-3 fw-bold shadow text-dark">⚖️ Auction house</a>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">Odjavi se</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card bg-secondary text-white mb-4 border-warning shadow" style="border-radius: 10px;">
            <div class="card-body d-flex justify-content-between align-items-center">
                <h3 class="m-0">
                    <span id="playerName" class="fw-bold">Učitavanje...</span> 
                    <span id="playerClan" class="fs-5 ms-2"></span>
                </h3>
                <h4 class="m-0 text-warning fw-bold">🪙 Zlato: <span id="playerGold">0</span></h4>
            </div>
        </div>

        <div class="row">
            <div class="col-md-5">
                <div class="card bg-dark text-white shadow border-success mb-4" style="border-radius: 8px;">
                    <div class="card-header border-success text-success fw-bold text-uppercase">
                        🤝 Pridruži se klanu
                    </div>
                    <div class="card-body p-3" id="availableClansContainer">
                        <p class="text-muted small">Učitavanje klanova...</p>
                    </div>
                </div>
            </div>

            <div class="col-md-7">
                <div class="card bg-dark text-white shadow mb-4" style="border-radius: 8px; border: 2px solid #8b4513;">
                    <div class="card-header fw-bold text-uppercase d-flex justify-content-between" style="border-bottom: 2px solid #8b4513; color: #deb887;">
                        <span>🏆 Tabela Najbogatijih</span>
                        <span class="badge text-dark" style="background-color: #deb887;">Top 5</span>
                    </div>
                    <div class="card-body p-0">
                        <table class="table table-dark table-hover m-0" style="border-radius: 0 0 8px 8px; overflow: hidden;">
                            <thead>
                                <tr class="text-muted small">
                                    <th class="text-center">Rang</th>
                                    <th>Ime Klana</th>
                                    <th class="text-center">Članovi</th>
                                    <th class="text-end pe-4">Ukupno Zlato</th>
                                </tr>
                            </thead>
                            <tbody id="leaderboardBody">
                                </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
